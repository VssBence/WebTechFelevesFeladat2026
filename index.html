<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autó Menü</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div>
        <h2>Autó Menü</h2>
        <button id="send-btn">Autók listázása</button>
    </div>
    



    

    <div id="result"></div>

    <script src="app.js"></script>
    <script>
        let modositas = false;
        async function loadDB(){
            try{
                const res = await fetch(`https://iit-playground.arondev.hu/api/${NeptunCode}/car`,{
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await res.json();
                console.log(data);

                if(!res.ok){
                    alert("Hiba a betöltés során: " + data.message)
                }

                const resultDiv = document.querySelector('#result');
                resultDiv.innerHTML = '';
                for(const car of data){
                    const carHtml = `
                    
                        <div class="card" data="${car.id}">
                            <a href="adatlap.html?id=${car.id}">${car.brand +" "+ car.model}</a>

                            
                            <p><strong>Gyártó:</strong> ${car.brand}</p>
                            <p><strong>Gyártás dátuma:</strong> ${car.dayOfCommission}</p>
                            <p><strong>Hajtás:</strong> ${car.electric ? "Elektromos" : "Benzines"}</p>
                            <p><strong>Fogyasztás:</strong> ${car.fuelUse.toFixed(2)} L</p>
                            <p><strong>Model: </strong> ${car.model}</p>
                            <p><strong>Tulajdonos:</strong> ${car.owner}</p>
                            <button onclick="modifyCar(${car.id})" id="modify" class="btn-primary">Módosítás</button>
                            <button onclick="deleteCar(${car.id})" id="delete" class="btn-danger">Törlés</button>
                            </div>
                    `;
                    resultDiv.innerHTML += carHtml;
                }

                const count = `
                <div id="counter">
                <p><strong>Kocsik száma:</strong> ${data.length}</p>
                </div>
                `;

                resultDiv.insertAdjacentHTML('afterbegin', count);

            }catch(err){
                console.log("Hiba az adatok betöltése során:" + err);
                alert("Hiba az adatok betöltésekor.");
            }
        }

        async function modifyCar(id){
            if(modositas){
                alert("Nem lehet többet módosítani mint 1 kocsi:(");
                return;
            }
            modositas = true;

            console.log(`Módosítandó autó ID: ${id}`);
            let data;

            try{
                const res = await fetch(`https://iit-playground.arondev.hu/api/${NeptunCode}/car/${id}`,{
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                data = await res.json();


                if(!res.ok){
                    alert("Hiba az autó lekérdezése során!: " + data.message);
                }


            }catch(err){
                console.log("Hiba az adatok betöltése során:" + err);
                alert("Hiba az adatok betöltésekor.");
            }


            const TargetDiv = document.querySelector(`.card[data="${id}"]`);
            TargetDiv.innerHTML = `
                            <p><strong>${data.brand +" "+ data.model}</strong></p>
                            <p><strong>Gyártó: </strong><input type="text" id="brand" value="${data.brand}"></p>
                            <p><strong>Gyártás dátuma: </strong><input type="date" id="dayOfCommission" value="${data.dayOfCommission}"></p>
                            <p><strong>Hajtás: </strong><input type="text" id="electric" value="${data.electric ? "Elektromos" : "Benzines"}"></p>
                            <p><strong>Fogyasztás: </strong><input type="number" id="fuelUse" value="${data.fuelUse.toFixed(2)}"> L</p>
                            <p><strong>Model: </strong><input type="text" id="model" value="${data.model}"></p>
                            <p><strong>Tulajdonos: </strong><input type="text" id="owner" value="${data.owner}"></p>
                            <button id="save" class="btn-primary btn-save">Mentés</button>
            `

            const SaveGomb = document.querySelector('#save');
            SaveGomb.addEventListener('click',async () => {
                const BrandTartalom = document.querySelector('#brand').value.trim();
                const DayOfCommissionTartalom = document.querySelector('#dayOfCommission').value;
                const ElectricTartalom = document.querySelector('#electric').value;
                const fuelUseTartalom = parseFloat(document.querySelector('#fuelUse').value);
                const modelTartalom = document.querySelector('#model').value;
                const ownerTartalom = document.querySelector('#owner').value;

                const kocsilista = ['Toyota', 'Honda', 'Ford', 'Chevrolet', 'Nissan', 'BMW', 'Mercedes-Benz', 'Volkswagen', 'Audi', 'Hyundai', 'Kia', 'Subaru', 'Lexus', 'Mazda', 'Tesla', 'Jeep', 'Porsche', 'Volvo', 'Jaguar', 'Land Rover', 'Mitsubishi', 'Ferrari', 'Lamborghini'];

                if(!(kocsilista.includes(BrandTartalom))){
                    alert("Nem létezik ilyen gyártó!");
                    return;
                }

                if(!(ElectricTartalom.toLowerCase() == "elektromos" || ElectricTartalom.toLowerCase() == "benzines")){
                    alert("A hajtás csak Elektromos vagy Benzines lehet!");
                    return;
                }

                if(ElectricTartalom.toLowerCase() == "elektromos" && fuelUseTartalom != 0){
                    alert("Elektromos kocsi fogyasztása csak 0 lehet!");
                    return;
                }

                if(ElectricTartalom.toLowerCase() == "benzines" && fuelUseTartalom == 0){
                    alert("Benzines kocsi fogyasztása nem lehet 0!");
                    return;
                }

                const carData = {
                    id : id,
                    brand : BrandTartalom,
                    dayOfCommission : DayOfCommissionTartalom,
                    electric : ElectricTartalom.toLowerCase() === "elektromos" ? true : false,
                    fuelUse : fuelUseTartalom,
                    model : modelTartalom,
                    owner : ownerTartalom
                }


                try{
                const res = await fetch(`https://iit-playground.arondev.hu/api/${NeptunCode}/car`,{
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body : JSON.stringify(carData)
                });

                data = await res.json();

                if(!res.ok){
                    alert("Hiba az autó lekérdezése során!\n" + data.message);
                    return;
                }

            }catch(err){
                console.log("Hiba a kocsi módosítása során:" + err);
                alert("Hiba a kocsi módosítása során:" + err);
            }

                alert("Módosítás sikeresen megtörtént!");
                loadDB();
                modositas = false;
            })
        }
        

        async function deleteCar(id){
            console.log(id + "id kocsi törlése");
            try{
                const res = await fetch(`https://iit-playground.arondev.hu/api/${NeptunCode}/car/${id}`,{
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                data = await res.json();

                if(!res.ok){
                    alert("Hiba az autó törlése során!: " + data.message);
                }else{
                    alert("ID: " + id + " kocsi sikeresen törölve!");
                    loadDB();
                }
                


            }catch(err){
                console.log("Hiba az autó törlése során a kérelemben: " + err);
                alert("Hiba az autó törlése során a kérelemben: " + err);
            }
        }

        



        const LekerdezesGomb = document.querySelector('#send-btn');
        LekerdezesGomb.addEventListener('click', () => {
            loadDB();
        })

    </script>
</body>
</html>
